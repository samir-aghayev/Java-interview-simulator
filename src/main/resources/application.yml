server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_simulator}
    username: ${DB_USER:interview_app}
    password: ${DB_PASSWORD:interview_app_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-please-override-in-production-1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
