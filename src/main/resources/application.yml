server:
  # Railway (and most PaaS hosts) inject PORT and expect the app to bind to it; SERVER_PORT
  # stays as the docker-compose/local-dev override, 8080 as the final fallback.
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_simulator}
    username: ${DB_USER:interview_app}
    password: ${DB_PASSWORD:interview_app_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-please-override-in-production-1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  frontend-url: ${FRONTEND_URL:http://localhost:8080}
  oauth2:
    google:
      # Boş qalarsa Google login sadəcə deaktiv olur, tətbiq normal işləyir (GoogleOAuthEnabledCondition).
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  smtp:
    # Boş qalarsa (host təyin olunmayıbsa) email-lər console-a loglanır (EmailConfig).
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
  mail:
    from: ${MAIL_FROM:no-reply@interview-simulator.local}
