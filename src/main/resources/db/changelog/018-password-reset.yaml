databaseChangeLog:
  - changeSet:
      id: 018-password-reset
      author: interview-simulator
      changes:
        - createTable:
            tableName: password_reset_token
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: user_id, type: UUID, constraints: {nullable: false, foreignKeyName: fk_reset_token_user, references: app_user(id), deleteCascade: true}}
              - column: {name: token, type: VARCHAR(128), constraints: {nullable: false, unique: true, uniqueConstraintName: uq_reset_token_token}}
              - column: {name: expires_at, type: TIMESTAMP, constraints: {nullable: false}}
              - column: {name: used, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP, constraints: {nullable: false}}
        - createIndex:
            indexName: idx_reset_token_user
            tableName: password_reset_token
            columns:
              - column: {name: user_id}
