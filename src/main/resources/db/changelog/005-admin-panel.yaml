databaseChangeLog:
  - changeSet:
      id: 005-admin-panel
      author: interview-simulator
      changes:
        - addColumn:
            tableName: question
            columns:
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - createTable:
            tableName: admin_audit_log
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: admin_user_id, type: UUID, constraints: {nullable: false}}
              - column: {name: action, type: VARCHAR(50), constraints: {nullable: false}}
              - column: {name: target_type, type: VARCHAR(30), constraints: {nullable: false}}
              - column: {name: target_id, type: UUID}
              - column: {name: details, type: TEXT}
              - column: {name: created_at, type: TIMESTAMP, constraints: {nullable: false}}
        - addForeignKeyConstraint:
            baseTableName: admin_audit_log
            baseColumnNames: admin_user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_admin_audit_log_user
            onDelete: CASCADE
        - createIndex:
            tableName: admin_audit_log
            indexName: idx_admin_audit_log_created_at
            columns:
              - column: {name: created_at}
