databaseChangeLog:
  - changeSet:
      id: 006-subjects-and-reports
      author: interview-simulator
      changes:
        - addColumn:
            tableName: question
            columns:
              - column:
                  name: subject
                  type: VARCHAR(100)
                  defaultValue: Java
                  constraints:
                    nullable: false

        - createTable:
            tableName: question_report
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: question_id, type: UUID, constraints: {nullable: false}}
              - column: {name: user_id, type: UUID, constraints: {nullable: false}}
              - column: {name: message, type: TEXT, constraints: {nullable: false}}
              - column: {name: status, type: VARCHAR(20), defaultValue: OPEN, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP, constraints: {nullable: false}}
              - column: {name: resolved_at, type: TIMESTAMP}
              - column: {name: resolver_admin_id, type: UUID}
        - addForeignKeyConstraint:
            baseTableName: question_report
            baseColumnNames: question_id
            referencedTableName: question
            referencedColumnNames: id
            constraintName: fk_question_report_question
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: question_report
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_question_report_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: question_report
            baseColumnNames: resolver_admin_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_question_report_resolver
        - createIndex:
            tableName: question_report
            indexName: idx_question_report_status
            columns:
              - column: {name: status}
        - createIndex:
            tableName: question_report
            indexName: idx_question_report_created_at
            columns:
              - column: {name: created_at}
